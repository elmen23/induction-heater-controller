name: Build IH-2000 Firmware

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - 'dev_server.py'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: platformio run

      - name: Rename firmware binary
        run: |
          cp .pio/build/esp32dev/induction_heater.bin IH-2000-v1.0.bin 2>/dev/null || true
          cp .pio/build/esp32dev/bootloader/bootloader.bin bootloader.bin 2>/dev/null || true
          cp .pio/build/esp32dev/partition_table/partition-table.bin partitions.bin 2>/dev/null || true

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: IH-2000-firmware
          path: |
            .pio/build/esp32dev/induction_heater.bin
            IH-2000-v1.0.bin
            bootloader.bin
            partitions.bin
          compression-level: 0
          if-no-files-found: warn

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            IH-2000-v1.0.bin
            bootloader.bin
            partitions.bin
          generate_release_notes: true
